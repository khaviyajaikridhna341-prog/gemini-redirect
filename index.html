<!DOCTYPE html>
<html>
<head>
  <title>Gemini Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1e1e2e; color: #cdd6f4; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
    .user { background: #89b4fa; color: #1e1e2e; align-self: flex-end; }
    .bot  { background: #313244; align-self: flex-start; }
    #input-area { display: flex; padding: 16px; gap: 10px; background: #181825; }
    #input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #313244; color: #cdd6f4; font-size: 15px; }
    #send { padding: 12px 20px; border-radius: 8px; border: none; background: #89b4fa; color: #1e1e2e; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Message Gemini..." />
    <button id="send">Send</button>
  </div>
  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user');
      addMsg('Thinking...', 'bot');

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      messages.lastChild.textContent = data.reply;
    }

    document.getElementById('send').onclick = send;
    input.addEventListener('keydown', e => e.key === 'Enter' && send());
  </script>
</body>
</html>
